<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>影月寒风 — 堵桥小分队</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200..800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.js"></script>
  <style>
    /* Gate overlay */
    .gate-overlay{position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;background:#0A0A0A;font-family:'Inter','Noto Sans SC',system-ui,sans-serif}
    .gate-box{text-align:center;max-width:380px;width:90%;padding:40px 32px}
    .gate-icon{margin-bottom:24px;display:flex;justify-content:center}
    .gate-icon svg{width:48px;height:48px;color:#F5C518}
    .gate-title{font-size:20px;font-weight:700;color:#F0F0F0;letter-spacing:.04em;margin-bottom:8px}
    .gate-sub{font-size:13px;color:#707070;letter-spacing:.06em;margin-bottom:28px}
    .gate-input-wrap{position:relative}
    .gate-input{width:100%;padding:14px 18px;background:#111;border:1px solid rgba(245,197,24,.15);border-radius:12px;color:#F0F0F0;font-size:18px;letter-spacing:.12em;text-align:center;outline:none;font-family:'JetBrains Mono',monospace;transition:border-color .3s,box-shadow .3s}
    .gate-input:focus{border-color:rgba(245,197,24,.4);box-shadow:0 0 20px rgba(245,197,24,.08)}
    .gate-input::placeholder{color:#404040;letter-spacing:.06em}
    .gate-error{color:#E50914;font-size:12px;margin-top:10px;opacity:0;transition:opacity .2s}
    .gate-error.show{opacity:1}
    .gate-hint{font-family:'JetBrains Mono',monospace;font-size:10px;color:#404040;margin-top:20px;letter-spacing:.08em}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Gate -->
  <div id="gate" class="gate-overlay">
    <div class="gate-box">
      <div class="gate-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
          <circle cx="12" cy="16" r="1"/>
        </svg>
      </div>
      <div class="gate-title">影月寒风 · 堵桥小分队</div>
      <div class="gate-sub">内部工具 · 请输入访问密码</div>
      <div class="gate-input-wrap">
        <input id="gateInput" class="gate-input" type="password" placeholder="****" maxlength="20" autofocus />
        <div id="gateError" class="gate-error">密码错误</div>
      </div>
      <div class="gate-hint">v3.0 · Finesse</div>
    </div>
  </div>

  <script>
    (function () {
      var PASSWORD = '9630';
      var STORAGE_KEY = 'yingyue_auth';
      var gate = document.getElementById('gate');
      var input = document.getElementById('gateInput');
      var error = document.getElementById('gateError');

      // Already authorized
      if (localStorage.getItem(STORAGE_KEY) === PASSWORD) {
        gate.remove();
        return;
      }

      function unlock() {
        localStorage.setItem(STORAGE_KEY, PASSWORD);
        gate.style.transition = 'opacity .4s';
        gate.style.opacity = '0';
        setTimeout(function () { gate.remove(); }, 400);
      }

      function showError() {
        error.classList.add('show');
        input.style.borderColor = 'rgba(229,9,20,.5)';
        input.style.boxShadow = '0 0 20px rgba(229,9,20,.1)';
        setTimeout(function () {
          error.classList.remove('show');
          input.style.borderColor = 'rgba(245,197,24,.15)';
          input.style.boxShadow = 'none';
        }, 2000);
      }

      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          if (input.value === PASSWORD) {
            unlock();
          } else {
            showError();
            input.value = '';
          }
        }
      });
    })();
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
